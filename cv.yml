basics:
  name: Timothy Noe
  title: ThM Candidate in Biblical Studies (New Testament)
  affiliation: Princeton Theological Seminary
  location: Piscataway, NJ
  email: timothy.daniel.noe@gmail.com
  phone: 848-239-0076          # shown on the PDF only, not the public website
  tagline: >
    New Testament philology and the earliest Christian literature, with computational methods
  interests: Jesus tradition > Paul > the Post-apostolic generation
  summary: >
    I am a ThM candidate in Biblical Studies, New Testament, at Princeton Theological Seminary.
    My research focuses on the linguistic and intertextual development of the earliest 
    Christian writings (the Jesus tradition in the Gospels, the letters of Paul, and the
    Apostolic Fathers) working closely from the Greek alongside Hebrew and Latin.
    To this research I bring computational and corpus-philological methods, best represented 
    by Ancient Library, a morphologically tagged multilingual corpus with robust search capabilities.
    I am also the author of the Terebinth Translation, a syntactically transparent English
    translation of the Greek New Testament. My previous training in physics at Duke grounds my work
    in rigorous quantitative method.
    

