# Display this section under a heading like "Research & Digital Humanities"
# rather than just "Projects" — it frames the work as scholarship.
projects:
  - title: Ancient Library
    url: https://ancientlibrary.org
    role: Creator, encoder, and developer
    years: 2025–present 
    desc: >
      A multilingual digital corpus of ancient sacred and cognate texts in
      Hebrew, Greek, and Latin, encoded with full morphological tagging and
      lemmatization and served through lemma-based concordance search,
      cross-reference linking, and aligned original-and-translation parallel
      editions.

  - title: Terebinth Translation of the New Testament
    url: "https://timothynoe.com/tb/"
    role: Translator and editor
    years: 2022–present
    status: "In progress"
    desc: >
      An original, syntactically transparent English translation of the New
      Testament that mirrors the word order, clause structure, and grammatical
      relationships of the underlying Greek, intended as a study resource for
      scholars and advanced students working directly with the Greek text.

