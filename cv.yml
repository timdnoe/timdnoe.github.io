  phone: 848-239-0076          # shown on the PDF only, not the public website
  tagline: >
    Bridging New Testament scholarship, the ancient languages, and
    computational tools.
  summary: >
    I am an M.A. candidate in Religious Studies at Rutgers University, where my
    work centers on the New Testament. I bring close study of the ancient
    languages — Biblical Greek, Hebrew, and Latin — together with computational
    methods, building projects such as a syntactical translation of Paul's
    letters and a semantic lexicon of ancient Greek. My background spans physics
    (Duke) and public administration (UNLV), and I have founded and built
    software ventures alongside my academic work.

